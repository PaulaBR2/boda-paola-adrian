<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boda - Paola & Adrián</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --beige: #f5efe7;
  --card: #ffffff;
  --navy: #1f2a44;
  --soft: #d9d2c8;
}

* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: 'Inter', sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
}

/* fondo */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:url("cortijo%20terry.jpeg") center/cover no-repeat;
  z-index:-2;
}
body::after {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(245,239,231,0.85);
  z-index:-1;
}

.container {
  max-width:520px;
  width:100%;
  background:var(--card);
  border-radius:18px;
  padding:35px 25px;
  box-shadow:0 10px 40px rgba(0,0,0,0.06);
  position:relative;
}

.names {
  font-family:'Playfair Display',serif;
  font-size:2.3rem;
  text-align:center;
  color:var(--navy);
}

.ornament {
  text-align:center;
  margin:10px 0 15px;
  color:var(--soft);
}

.info,.quote {
  text-align:center;
  margin-bottom:20px;
}

.field {margin-bottom:18px;}

label {
  font-size:0.75rem;
  color:var(--navy);
  display:block;
  margin-bottom:6px;
}

input,select,textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #e5e2dd;
  background:#faf9f7;
}

button {
  width:100%;
  padding:14px;
  border:none;
  background:var(--navy);
  color:white;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

/* 🎉 MENSAJE ANIMADO */
.success {
  opacity:0;
  transform:translateY(10px);
  text-align:center;
  margin-top:20px;
  transition:0.5s ease;
}

.success.show {
  opacity:1;
  transform:translateY(0);
}

/* ✔️ CHECK SVG */
.check {
  width:60px;
  height:60px;
  margin:10px auto;
}

.check path {
  stroke: var(--navy);
  stroke-width: 3;
  fill: none;
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
  animation: draw 0.6s ease forwards;
}

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

.footer {
  text-align:center;
  margin-top:25px;
  font-size:0.8rem;
}
</style>
</head>

<body>

<div class="container">

  <div class="names">Paola & Adrián</div>
  <div class="ornament">✦</div>

  <div class="info">
    22 de agosto · Cortijo Terry
  </div>

  <div class="quote">
    - Para que el amor siempre encuentre su rumbo -
  </div>

  <form id="form">

    <div class="field">
      <label>Nombre completo</label>
      <input type="text" name="nombre" required>
    </div>

    <div class="field">
      <label>Asistencia</label>
      <select name="asistencia" required>
        <option value="">Seleccionar</option>
        <option value="Si">Sí</option>
        <option value="No">No</option>
      </select>
    </div>

    <div class="field">
      <label>Menú</label>
      <select name="menu" required>
        <option value="">Seleccionar</option>
        <option value="Carne">Carne</option>
        <option value="Pescado">Pescado</option>
      </select>
    </div>

    <div class="field">
      <label>Alergias</label>
      <textarea name="alergias"></textarea>
    </div>

    <button type="submit" id="btn">Confirmar asistencia</button>

  </form>

  <!-- 🎉 MENSAJE -->
  <div class="success" id="msg">
    
    <svg class="check" viewBox="0 0 52 52">
      <path d="M14 27 L22 35 L38 18"></path>
    </svg>

    <div>✨ ¡Confirmación enviada! ✨</div>

  </div>

  <div class="footer">¡Os esperamos!</div>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwTgEG_yvai_0J9pcf7RelffN3BAeqpghJ9H92NtbJwkqgjOJHR5geyJbVYNysarFvv/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const form = e.target;
  const btn = document.getElementById("btn");

  // 🎯 UI inmediata
  btn.textContent = "Enviando...";
  btn.disabled = true;

  document.getElementById("msg").classList.add("show");

  const formData = new FormData(form);

  fetch(scriptURL, {
    method: "POST",
    body: formData,
    mode: "no-cors"
  });

  form.reset();
});
</script>

</body>
</html>
